<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.6s ease, color 0.4s ease;
  background: #0a0a1a;
  color: #e8e0ff;
  position: relative;
}

body.theme-galaxy {
  --accent: #a78bfa; --accent2: #60a5fa;
  --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.1);
  --text: #e8e0ff; --muted: rgba(200,190,255,0.5);
  --header-bg: rgba(100,70,200,0.25); --row-hover: rgba(167,139,250,0.08);
  --inp-bg: rgba(255,255,255,0.06); --btn: linear-gradient(135deg,#7c3aed,#3b82f6);
  --shadow: 0 4px 28px rgba(100,50,200,0.25);
  background: #0a0a1a; color: #e8e0ff;
}
body.theme-sunrise {
  --accent: #f97316; --accent2: #fbbf24;
  --surface: rgba(255,255,255,0.65); --border: rgba(255,140,80,0.25);
  --text: #2d1a0e; --muted: rgba(100,60,20,0.5);
  --header-bg: rgba(251,191,36,0.2); --row-hover: rgba(249,115,22,0.07);
  --inp-bg: rgba(255,255,255,0.85); --btn: linear-gradient(135deg,#f97316,#fbbf24);
  --shadow: 0 4px 28px rgba(249,115,22,0.15);
  background: #fff8f0; color: #2d1a0e;
}
body.theme-ocean {
  --accent: #38bdf8; --accent2: #06b6d4;
  --surface: rgba(255,255,255,0.04); --border: rgba(56,189,248,0.15);
  --text: #e0f2fe; --muted: rgba(148,225,255,0.45);
  --header-bg: rgba(14,116,144,0.3); --row-hover: rgba(56,189,248,0.07);
  --inp-bg: rgba(255,255,255,0.06); --btn: linear-gradient(135deg,#0284c7,#06b6d4);
  --shadow: 0 4px 28px rgba(56,189,248,0.15);
  background: #0c1a2e; color: #e0f2fe;
}
body.theme-forest {
  --accent: #4ade80; --accent2: #86efac;
  --surface: rgba(255,255,255,0.04); --border: rgba(74,222,128,0.15);
  --text: #dcfce7; --muted: rgba(134,239,172,0.45);
  --header-bg: rgba(20,83,45,0.4); --row-hover: rgba(74,222,128,0.07);
  --inp-bg: rgba(255,255,255,0.06); --btn: linear-gradient(135deg,#16a34a,#4ade80);
  --shadow: 0 4px 28px rgba(74,222,128,0.12);
  background: #0d1a0f; color: #dcfce7;
}

#stars-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  transition: opacity 0.8s ease;
}
body.theme-galaxy #stars-canvas { opacity: 1; }
body:not(.theme-galaxy) #stars-canvas { opacity: 0; }

.bg-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  opacity: 0; transition: opacity 0.8s ease;
}
body.theme-sunrise .bg-sunrise { opacity: 1; }
body.theme-ocean .bg-ocean { opacity: 1; }
body.theme-forest .bg-forest { opacity: 1; }
.bg-sunrise { background: radial-gradient(ellipse 80% 50% at 50% 110%, #fef3c7 0%, #fed7aa 30%, #fdba74 55%, #fff8f0 80%); }
.bg-ocean { background: radial-gradient(ellipse 100% 60% at 50% 0%, #0c4a6e 0%, #0c1a2e 60%); }
.bg-forest { background: radial-gradient(ellipse 100% 60% at 30% 0%, #14532d 0%, #0d1a0f 60%); }

/* Silhouettes */
.silhouette {
  position: fixed; bottom: 0; left: 0; width: 100%; pointer-events: none;
  z-index: 0; opacity: 0; transition: opacity 0.8s ease;
}
body.theme-galaxy .sil-galaxy { opacity: 1; }
body.theme-sunrise .sil-sunrise { opacity: 1; }
body.theme-ocean .sil-ocean { opacity: 1; }
body.theme-forest .sil-forest { opacity: 1; }

/* Fish swimming animation */
@keyframes swim {
  0%   { transform: translateX(0) scaleX(1); }
  48%  { transform: translateX(120px) scaleX(1); }
  50%  { transform: translateX(120px) scaleX(-1); }
  98%  { transform: translateX(0) scaleX(-1); }
  100% { transform: translateX(0) scaleX(1); }
}
@keyframes swim2 {
  0%   { transform: translateX(0) scaleX(-1); }
  48%  { transform: translateX(-90px) scaleX(-1); }
  50%  { transform: translateX(-90px) scaleX(1); }
  98%  { transform: translateX(0) scaleX(1); }
  100% { transform: translateX(0) scaleX(-1); }
}
@keyframes sway {
  0%,100% { transform-origin: bottom center; transform: rotate(-4deg); }
  50%      { transform-origin: bottom center; transform: rotate(4deg); }
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
@keyframes bird {
  0%   { transform: translateX(-60px); opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { transform: translateX(calc(100vw + 60px)); opacity: 0; }
}
.fish-anim  { animation: swim  9s ease-in-out infinite; }
.fish-anim2 { animation: swim2 13s ease-in-out infinite; }
.coral-sway { animation: sway 4s ease-in-out infinite; }
.float-anim { animation: float 3s ease-in-out infinite; }
.bird-fly   { animation: bird 18s linear infinite; }
.bird-fly2  { animation: bird 24s linear 6s infinite; }

.container {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: 40px 20px 80px;
}

header { text-align: center; margin-bottom: 32px; }
.title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(26px,5vw,40px);
  font-style: italic;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 6px;
}
.subtitle { color: var(--muted); font-size: 12px; font-weight: 300; letter-spacing: 2.5px; text-transform: uppercase; }

.theme-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; flex-wrap: wrap; }
.theme-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 40px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px);
}
.theme-btn:hover { color: var(--text); border-color: var(--accent); }
.theme-btn.active { color: var(--accent); border-color: var(--accent); background: var(--row-hover); }
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

.add-section-bar { display: flex; gap: 10px; margin-bottom: 20px; }
.section-name-inp {
  flex: 1; background: var(--inp-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 14px;
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.section-name-inp::placeholder { color: var(--muted); }
.section-name-inp:focus { border-color: var(--accent); }
.add-section-btn {
  background: var(--surface); border: 1px dashed var(--accent);
  color: var(--accent); border-radius: 8px; padding: 9px 18px;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.add-section-btn:hover { background: var(--row-hover); }

.section-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; backdrop-filter: blur(20px);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 24px;
}
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: var(--header-bg);
  border-bottom: 1px solid var(--border);
}
.section-title-wrap { display: flex; align-items: center; gap: 10px; }
.section-icon { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.section-name { font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); }
.section-count { color: var(--muted); font-size: 12px; }
.del-sec-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 16px; padding: 2px 6px;
  border-radius: 4px; transition: color 0.2s, background 0.2s;
}
.del-sec-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }

.add-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr auto;
  gap: 10px; padding: 13px 18px;
  border-bottom: 1px solid var(--border);
}
.add-row input {
  background: var(--inp-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px;
  outline: none; transition: border-color 0.2s; width: 100%;
}
.add-row input::placeholder { color: var(--muted); }
.add-row input:focus { border-color: var(--accent); }
.add-btn {
  background: var(--btn); border: none; border-radius: 8px;
  padding: 8px 16px; color: #fff;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: opacity 0.2s, transform 0.15s;
}
.add-btn:hover { opacity: 0.85; transform: translateY(-1px); }

table { width: 100%; border-collapse: collapse; }
th {
  padding: 11px 18px; text-align: left;
  font-size: 11px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent);
}
td { padding: 12px 18px; font-size: 14px; color: var(--text); border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:hover td { background: var(--row-hover); }
tbody tr:last-child td { border-bottom: none; }
.num-col { color: var(--muted); font-size: 12px; width: 36px; }
.del-row-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 16px; padding: 2px 6px;
  border-radius: 4px; transition: color 0.2s, background 0.2s;
}
.del-row-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }
.empty-td { text-align: center; padding: 36px !important; color: var(--muted) !important; font-style: italic; font-size: 13px; }

@media (max-width: 580px) {
  .add-row { grid-template-columns: 1fr 1fr; }
  .add-row input:first-child { grid-column: 1/-1; }
}
</style>
</head>

<!-- FOREST silhouette: layered pine trees + fireflies -->
<svg class="silhouette sil-forest" viewBox="0 0 1440 260" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet" style="height:260px">
  <!-- far trees (lighter) -->
  <!-- tree macro: trunk + 3 triangle layers -->
  <!-- row of distant pines -->
  <g fill="rgba(10,60,25,0.45)">
    <polygon points="60,180 90,260 30,260"/>
    <polygon points="60,155 95,210 25,210"/>
    <polygon points="60,135 90,175 30,175"/>

<div class="container">
  <header>
    <div class="title">Activity Tracker</div>
    <div class="subtitle">Sections · Chronological order</div>
  </header>

  <div class="theme-bar" id="theme-bar">
    <button class="theme-btn active" data-theme="galaxy">
      <span class="dot" style="background:linear-gradient(135deg,#7c3aed,#3b82f6)"></span> Galaxy
    </button>
    <button class="theme-btn" data-theme="sunrise">
      <span class="dot" style="background:linear-gradient(135deg,#fbbf24,#f97316)"></span> Sunrise
    </button>
    <button class="theme-btn" data-theme="ocean">
      <span class="dot" style="background:linear-gradient(135deg,#0284c7,#06b6d4)"></span> Ocean
    </button>
    <button class="theme-btn" data-theme="forest">
      <span class="dot" style="background:linear-gradient(135deg,#16a34a,#4ade80)"></span> Forest
    </button>
  </div>

  <div class="add-section-bar">
    <input class="section-name-inp" id="new-section-name" placeholder="New section name (e.g. Self-Study, Work, Exercise…)" />
    <button class="add-section-btn" id="add-section-btn">+ Add Section</button>
  </div>

  <div id="sections-container"></div>
</div>

<script>
(function() {

// ── Stars ──────────────────────────────────────────────────────────────────
var canvas = document.getElementById('stars-canvas');
var ctx = canvas.getContext('2d');
var stars = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function initStars() {
  stars = [];
  for (var i = 0; i < 220; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.2,
      speed: Math.random() * 0.004 + 0.002,
      offset: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    var a = 0.25 + 0.75 * Math.abs(Math.sin(t * s.speed + s.offset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(220,210,255,' + a + ')';
    ctx.fill();
  }
}

function animate(t) { drawStars(t / 1000); requestAnimationFrame(animate); }
resizeCanvas(); initStars(); animate(0);
window.addEventListener('resize', function() { resizeCanvas(); initStars(); });

// ── Theme ──────────────────────────────────────────────────────────────────
document.getElementById('theme-bar').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-theme]');
  if (!btn) return;
  document.body.className = 'theme-' + btn.getAttribute('data-theme');
  document.querySelectorAll('.theme-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
});

// ── Data ───────────────────────────────────────────────────────────────────
var sections = [{ id: 's1', name: 'General', rows: [] }];
var nextSid = 2;

function todayStr() { return new Date().toISOString().split('T')[0]; }

function parseTime(str) {
  if (!str) return 99999;
  str = str.trim().toLowerCase();
  var m = str.match(/(\d{1,2}):?(\d{2})?\s*(am|pm)?/);
  if (!m) return 99999;
  var h = parseInt(m[1], 10);
  var min = m[2] ? parseInt(m[2], 10) : 0;
  var p = m[3];
  if (p === 'pm' && h !== 12) h += 12;
  if (p === 'am' && h === 12) h = 0;
  return h * 60 + min;
}

function sortRows(rows) {
  return rows.slice().sort(function(a, b) {
    if (a.date < b.date) return -1;
    if (a.date > b.date) return 1;
    return parseTime(a.time) - parseTime(b.time);
  });
}

function fmtDate(d) {
  if (!d) return '';
  var p = d.split('-');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(p[1],10)-1] + ' ' + parseInt(p[2],10) + ', ' + p[0];
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  var container = document.getElementById('sections-container');
  container.innerHTML = '';

  sections.forEach(function(sec) {
    var card = document.createElement('div');
    card.className = 'section-card';
    card.setAttribute('data-sid', sec.id);

    // Header
    var hdr = document.createElement('div');
    hdr.className = 'section-header';
    var titleWrap = document.createElement('div');
    titleWrap.className = 'section-title-wrap';
    titleWrap.innerHTML =
      '<div class="section-icon"></div>' +
      '<span class="section-name">' + esc(sec.name) + '</span>' +
      '<span class="section-count">' + sec.rows.length + ' ' + (sec.rows.length === 1 ? 'entry' : 'entries') + '</span>';
    hdr.appendChild(titleWrap);
    if (sections.length > 1) {
      var delSecBtn = document.createElement('button');
      delSecBtn.className = 'del-sec-btn';
      delSecBtn.textContent = '×';
      delSecBtn.setAttribute('data-sid', sec.id);
      delSecBtn.addEventListener('click', function() { deleteSection(sec.id); });
      hdr.appendChild(delSecBtn);
    }
    card.appendChild(hdr);

    // Add row form
    var addRow = document.createElement('div');
    addRow.className = 'add-row';
    var inpActivity = document.createElement('input');
    inpActivity.type = 'text'; inpActivity.placeholder = 'Activity name…';
    var inpTime = document.createElement('input');
    inpTime.type = 'text'; inpTime.placeholder = 'Time (e.g. 9:00 AM)';
    var inpDate = document.createElement('input');
    inpDate.type = 'date'; inpDate.value = todayStr();
    var addBtn = document.createElement('button');
    addBtn.className = 'add-btn'; addBtn.textContent = '+ Add';

    function doAdd() {
      var activity = inpActivity.value.trim();
      var time = inpTime.value.trim();
      var date = inpDate.value;
      if (!activity && !time && !date) return;
      sec.rows.push({ id: 'r' + Date.now(), activity: activity, time: time, date: date });
      render();
    }

    addBtn.addEventListener('click', doAdd);
    [inpActivity, inpTime, inpDate].forEach(function(inp) {
      inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') doAdd(); });
    });

    addRow.appendChild(inpActivity);
    addRow.appendChild(inpTime);
    addRow.appendChild(inpDate);
    addRow.appendChild(addBtn);
    card.appendChild(addRow);

    // Table
    var table = document.createElement('table');
    var thead = document.createElement('thead');
    thead.innerHTML = '<tr><th style="width:36px">#</th><th>Activity</th><th>Time</th><th>Date</th><th style="width:40px"></th></tr>';
    table.appendChild(thead);
    var tbody = document.createElement('tbody');

    var sorted = sortRows(sec.rows);
    if (sorted.length === 0) {
      var emptyTr = document.createElement('tr');
      var emptyTd = document.createElement('td');
      emptyTd.colSpan = 5; emptyTd.className = 'empty-td';
      emptyTd.textContent = 'No entries yet — add one above ✦';
      emptyTr.appendChild(emptyTd);
      tbody.appendChild(emptyTr);
    } else {
      sorted.forEach(function(r, i) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="num-col">' + (i+1) + '</td>' +
          '<td>' + (r.activity || '<span style="opacity:0.35">—</span>') + '</td>' +
          '<td>' + (r.time || '<span style="opacity:0.35">—</span>') + '</td>' +
          '<td>' + (fmtDate(r.date) || '<span style="opacity:0.35">—</span>') + '</td>' +
          '<td></td>';
        var delBtn = document.createElement('button');
        delBtn.className = 'del-row-btn'; delBtn.textContent = '×';
        (function(rowId) {
          delBtn.addEventListener('click', function() { deleteRow(sec.id, rowId); });
        })(r.id);
        tr.cells[4].appendChild(delBtn);
        tbody.appendChild(tr);
      });
    }
    table.appendChild(tbody);
    card.appendChild(table);
    container.appendChild(card);
  });
}

function deleteRow(sid, rid) {
  var sec = sections.find(function(s) { return s.id === sid; });
  if (!sec) return;
  sec.rows = sec.rows.filter(function(r) { return r.id !== rid; });
  render();
}

function deleteSection(sid) {
  sections = sections.filter(function(s) { return s.id !== sid; });
  render();
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Add section ────────────────────────────────────────────────────────────
document.getElementById('add-section-btn').addEventListener('click', function() {
  var inp = document.getElementById('new-section-name');
  var name = inp.value.trim();
  if (!name) return;
  sections.push({ id: 's' + nextSid++, name: name, rows: [] });
  inp.value = '';
  render();
});
document.getElementById('new-section-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('add-section-btn').click();
});

render();

})();
</script>
</body>
